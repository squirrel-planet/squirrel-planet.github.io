<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到松鼠星球</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #110c1b 50%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
        }

        .logo-bg img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.8;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            max-width: 1200px;
            position: relative;
            z-index: 1;
            gap: 60px;
        }

        .text-section {
            flex: 1;
        }

        .text-section h1 {
            font-size: 4.5rem;
            font-weight: 800;
            color: #FFA500;
            letter-spacing: 2px;
        }

        .text-section p {
            font-size: 20px;
            font-weight: 100;
            color: #ffcc5f;
            
        }

        .code-section {
            flex: 1;
            max-width: 500px;
        }

        .code-box {
            background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 
                0 10px 40px rgba(255, 165, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 3px solid #FFA500;
        }

        .code-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .code-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .code-title {
            color: #FFA500;
            font-size: 0.9rem;
            margin-right: auto;
        }

        pre {
            margin: 0;
            overflow-x: auto;
        }

        code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #FFB733;
        }

        .keyword { color: #D8B4FE; }
        .string { color: #86EFAC; }
        .function { color: #93C5FD; }
        .comment { color: #6B7280; }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            h1 {
                font-size: 2.5rem;
            }

            .code-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="logo-bg">
        <img src="logo.png" alt="松鼠星球Logo">
    </div>

    <div class="container">
        <div class="text-section">
            <h1>欢迎来到松鼠星球</h1>
            <p>
                在银河系的第三悬臂边缘，漂浮着一枚形似松鼠的迷幻图腾<br>
                这里正是「代码囤积者」的终极巢穴
            </p>
        </div>

        <div class="code-section">
            <div class="code-box">
                <div class="code-header">
                    <span class="code-title">squirrel.js</span>
                </div>
                <pre><code><span class="comment">// 欢迎来到松鼠星球!</span>
<span class="keyword">const</span> squirrel = {
  <span class="string">name</span>: <span class="string">"松鼠"</span>,
  <span class="string">planet</span>: <span class="string">"松鼠星球"</span>,
  <span class="string">status</span>: <span class="string">"热情欢迎"</span>,
  <span class="string">nuts</span>: <span class="keyword">Infinity</span>
};

<span class="function">welcome</span>(squirrel);</code></pre>
            </div>
        </div>
    </div>
</body>
</html>
