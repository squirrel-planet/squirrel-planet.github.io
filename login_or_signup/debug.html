<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Debug</title>
</head>
<body>
    <h2>调试信息</h2>
    <button onclick="runTest()">运行测试</button>
    <pre id="out" style="background:#eee;padding:10px;white-space:pre-wrap;"></pre>
    
    <script>
    function log(...args) {
        document.getElementById('out').textContent += args.join(' ') + '\n';
    }
    
    async function runTest() {
        const out = document.getElementById('out');
        out.textContent = '';
        
        const url = 'https://song-shu.infinityfree.me/backend/auth.php';
        
        log('1. 测试 ping...');
        
        try {
            const r1 = await fetch(url + '?ping=1', { 
                method: 'GET',
                mode: 'cors'
            });
            log('GET ping 成功:', r1.status);
        } catch(e) {
            log('GET ping 失败:', e.message);
        }
        
        log('\n2. 测试 OPTIONS...');
        
        try {
            const r2 = await fetch(url, { 
                method: 'OPTIONS',
                mode: 'cors',
                headers: {
                    'Origin': 'http://localhost:8080',
                    'Access-Control-Request-Method': 'POST'
                }
            });
            log('OPTIONS 成功:', r2.status);
            log('Headers:', [...r2.headers.entries()]);
        } catch(e) {
            log('OPTIONS 失败:', e.message);
        }
        
        log('\n3. 测试 POST...');
        
        try {
            const r3 = await fetch(url, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: 'ping' })
            });
            log('POST 成功:', r3.status);
        } catch(e) {
            log('POST 失败:', e.message);
        }
    }
    </script>
</body>
</html>
