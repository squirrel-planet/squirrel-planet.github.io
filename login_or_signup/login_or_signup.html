<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登陆星球 - 松鼠星球</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange-primary: #FF8C00;
            --orange-light: #FFA500;
            --orange-dark: #FF6B00;
            --orange-glow: #FFB347;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --text-light: #F0F6FC;
            --text-dim: #8B949E;
            --code-green: #00FF9D;
            --accent-purple: #A855F7;
            --accent-pink: #EC4899;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .auth-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 140, 0, 0.2);
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange-dark), var(--orange-glow), var(--orange-dark));
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--orange-light), var(--orange-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 12px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--orange-primary);
            color: var(--bg-dark);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 500;
        }

        .input-container {
            display: flex;
            align-items: stretch;
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 12px;
            background: var(--bg-dark);
            overflow: hidden;
        }

        .input-container:focus-within {
            border-color: var(--orange-primary);
        }

        .logo-area {
            width: 50px; /* 减小logo区域宽度 */
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 140, 0, 0.1);
            border-right: 1px solid rgba(255, 140, 0, 0.2);
        }

        .logo-area img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .logo-area svg {
            width: 20px;
            height: 20px;
        }

        .input-field {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-dim);
        }

        .input-with-btn {
            flex: 1;
            display: flex;
        }

        .btn-wrapper {
            padding: 0 8px; /* 减小按钮包装器的内边距 */
            display: flex;
            align-items: center;
        }

        .copy-btn, .send-btn {
            padding: 10px 10px; /* 减小按钮的内边距 */
            background: rgba(255, 140, 0, 0.2);
            color: var(--orange-primary);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            min-width: 40px; /* 设置最小宽度 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover, .send-btn:hover {
            background: rgba(255, 140, 0, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.3);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 10px;
        }

        .form-footer a {
            color: var(--orange-primary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            color: var(--code-green);
        }

        .message.error {
            background: rgba(236, 72, 153, 0.1);
            border: 1px solid rgba(236, 72, 153, 0.3);
            color: var(--accent-pink);
        }

        .message.show {
            display: block;
        }

        .logo-user {
            background: rgba(255, 140, 0, 0.1);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .logo-password {
            background: rgba(168, 85, 247, 0.1);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .logo-email {
            background: rgba(236, 72, 153, 0.1);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .logo-verify {
            background: rgba(255, 215, 0, 0.1);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .logo-change-animation {
            animation: logoChange 0.3s ease;
        }

        @keyframes logoChange {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .auth-container {
                padding: 25px;
                margin: 10px;
            }

            .input-container {
                flex-direction: column;
                align-items: stretch;
            }

            .logo-area {
                border-right: none;
                border-bottom: 1px solid rgba(255, 140, 0, 0.2);
                padding: 10px 0;
            }
        }

        /* 自定义弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-light);
        }

        .modal-message {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 25px;
            line-height: 1.5;
            white-space: pre-wrap;
            text-align: center;
        }

        .modal-btn {
            padding: 12px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            color: white;
        }

        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>松鼠星球</h1>
                <p>欢迎来到代码与艺术缠绕的魔法秘境</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label for="loginUsername">用户名</label>
                    <div class="input-container">
                        <div class="logo-area" id="loginLogoArea">
                            <div class="logo-user">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="text" id="loginUsername" class="input-field" placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="loginPassword">密码</label>
                    <div class="input-container">
                        <div class="logo-area" id="loginPasswordLogoArea">
                            <div class="logo-password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="password" id="loginPassword" class="input-field" placeholder="请输入密码" autocomplete="current-password">
                        <div class="btn-wrapper">
                            <button type="button" class="copy-btn" id="loginCopyBtn" title="复制密码">📋</button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="auth-btn">登录</button>

                <div class="form-footer">
                    <a href="#" id="forgotPassword">忘记密码？</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label for="registerUsername">用户名</label>
                    <div class="input-container">
                        <div class="logo-area" id="registerLogoArea">
                            <div class="logo-user">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="text" id="registerUsername" class="input-field" placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="registerPassword">密码</label>
                    <div class="input-container">
                        <div class="logo-area" id="registerPasswordLogoArea">
                            <div class="logo-password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="password" id="registerPassword" class="input-field" placeholder="请输入密码" autocomplete="new-password">
                        <div class="btn-wrapper">
                            <button type="button" class="copy-btn" id="registerCopyBtn" title="复制密码">📋</button>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">再次输入密码</label>
                    <div class="input-container">
                        <div class="logo-area" id="confirmPasswordLogoArea">
                            <div class="logo-password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="password" id="confirmPassword" class="input-field" placeholder="请再次输入密码" autocomplete="new-password">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">邮箱</label>
                    <div class="input-container">
                        <div class="logo-area" id="emailLogoArea">
                            <div class="logo-email">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="5" width="18" height="14" rx="2" ry="2"/>
                                    <polyline points="3,5 12,12 21,5"/>
                                </svg>
                            </div>
                        </div>
                        <input type="email" id="email" class="input-field" placeholder="请输入邮箱" autocomplete="email">
                        <div class="btn-wrapper">
                            <button type="button" class="send-btn" id="sendVerification" title="发送验证码">发送</button>
                            <!--button" class=" <button type="send-btn" id="testConnection" title="测试连接" style="margin-left: 5px; background: rgba(0, 255, 157, 0.1); color: #00FF9D; border-color: rgba(0, 255, 157, 0.3);">测试</button> -->
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="verification">验证码</label>
                    <div class="input-container">
                        <div class="logo-area" id="verificationLogoArea">
                            <div class="logo-verify">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <polyline points="12,6 12,12 16,14"/>
                                </svg>
                            </div>
                        </div>
                        <input type="text" id="verification" class="input-field" placeholder="请输入验证码">
                    </div>
                </div>

                <button type="submit" class="auth-btn">注册</button>
            </form>

            <!-- 忘记密码表单 -->
            <form id="forgotPasswordForm" class="auth-form">
                <div class="input-group">
                    <label for="forgotEmail">邮箱</label>
                    <div class="input-container">
                        <div class="logo-area" id="forgotEmailLogoArea">
                            <div class="logo-email">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="5" width="18" height="14" rx="2" ry="2"/>
                                    <polyline points="3,5 12,12 21,5"/>
                                </svg>
                            </div>
                        </div>
                        <input type="email" id="forgotEmail" class="input-field" placeholder="请输入注册时使用的邮箱">
                    </div>
                </div>

                <button type="submit" class="auth-btn">发送验证码</button>

                <div class="form-footer">
                    <a href="#" id="backToLogin">返回登录</a>
                </div>
            </form>

            <!-- 验证码验证表单 -->
            <form id="verifyCodeForm" class="auth-form">
                <div class="input-group">
                    <label for="verifyEmail">邮箱</label>
                    <div class="input-container">
                        <div class="logo-area" id="verifyEmailLogoArea">
                            <div class="logo-email">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="5" width="18" height="14" rx="2" ry="2"/>
                                    <polyline points="3,5 12,12 21,5"/>
                                </svg>
                            </div>
                        </div>
                        <input type="email" id="verifyEmail" class="input-field" placeholder="请输入邮箱" readonly>
                    </div>
                </div>

                <div class="input-group">
                    <label for="verificationCode">验证码</label>
                    <div class="input-container">
                        <div class="logo-area" id="verificationCodeLogoArea">
                            <div class="logo-verify">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <polyline points="12,6 12,12 16,14"/>
                                </svg>
                            </div>
                        </div>
                        <input type="text" id="verificationCode" class="input-field" placeholder="请输入收到的验证码">
                    </div>
                </div>

                <button type="submit" class="auth-btn">验证验证码</button>

                <div class="form-footer">
                    <a href="#" id="backToForgot">返回上一步</a>
                </div>
            </form>

            <!-- 重置密码表单 -->
            <form id="resetPasswordForm" class="auth-form">
                <div class="input-group">
                    <label for="resetNewPassword">新密码</label>
                    <div class="input-container">
                        <div class="logo-area" id="resetPasswordLogoArea">
                            <div class="logo-password">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="password" id="resetNewPassword" class="input-field" placeholder="请输入新密码">
                    </div>
                </div>

                <div class="input-group">
                    <label for="resetConfirmPassword">确认新密码</label>
                    <div class="input-container">
                        <div class="logo-area" id="resetConfirmPasswordLogoArea">

                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                        </div>
                        <input type="password" id="resetConfirmPassword" class="input-field" placeholder="请再次输入新密码">
                    </div>
                </div>

                <input type="hidden" id="resetTempToken">

                <button type="submit" class="auth-btn">重置密码</button>

                <div class="form-footer">
                    <a href="#" id="backToLogin2">返回登录</a>
                </div>
            </form>
        </div>
    </div>

    <!-- 自定义弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">提示</div>
            <div class="modal-message" id="modalMessage"></div>
            <button class="modal-btn primary" id="modalBtn">确定</button>
        </div>
    </div>

    <script>
        // 后端 API 地址（前后端分离部署）
        const API_BASE_URL = 'https://song-shu.infinityfree.me/backend';

        // fetch 请求函数 (带CORS)
        async function jsonpRequest(url, params) {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(params),
                mode: 'cors'
            });
            return await response.json();
        }

        // 测试 CORS 连接

        // 自定义弹窗函数
        function showModal(type, title, message, callback) {
            const overlay = document.getElementById('modalOverlay');
            const titleEl = document.getElementById('modalTitle');
            const messageEl = document.getElementById('modalMessage');
            const btnEl = document.getElementById('modalBtn');

            titleEl.textContent = title;
            messageEl.textContent = message;

            overlay.classList.add('show');

            btnEl.onclick = function() {
                overlay.classList.remove('show');
                if (callback) callback();
            };

            overlay.onclick = function(e) {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                    if (callback) callback();
                }
            };
        }

        function alert(msg, callback) {
            showModal('info', '提示', msg, callback);
        }

        function success(msg, callback) {
            showModal('success', '成功', msg, callback);
        }

        function error(msg, callback) {
            showModal('error', '错误', msg, callback);
        }

        function warning(msg, callback) {
            showModal('warning', '警告', msg, callback);
        }

        // 当前邮箱（用于忘记密码流程）
        let currentEmail = '';
        // 验证码发送状态
        let isSending = false;

        // 切换登录/注册表单
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                // 移除所有按钮的active类
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                
                // 添加active类到当前按钮
                button.classList.add('active');
                
                // 隐藏所有表单
                document.querySelectorAll('.auth-form').forEach(form => {
                    form.classList.remove('active');
                });
                
                // 显示对应表单
                const tab = button.getAttribute('data-tab');
                document.getElementById(`${tab}Form`).classList.add('active');
            });
        });

        // 登录表单提交事件
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                warning('请填写用户名和密码');
                return;
            }

            `;

        resetNewPassword.addEventListener('blur', () => {
            if (!resetNewPassword.value) {
                resetPasswordLogoArea.innerHTML = `

        });

        // 使用Web Crypto API进行密码哈希
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 验证邮箱格式
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
