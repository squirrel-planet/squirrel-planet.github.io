<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JSONP测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #result { background: #f0f0f0; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>JSONP 测试</h2>
    <button onclick="testJSONP()">测试发送验证码 (JSONP)</button>
    <div id="result"></div>
    
    <script>
        function log(msg) {
            document.getElementById('result').textContent = msg;
        }
        
        function callback(data) {
            log('成功: ' + JSON.stringify(data));
        }
        
        function testJSONP() {
            log('测试中...');
            const script = document.createElement('script');
            script.src = 'https://song-shu.infinityfree.me/backend/jsonp.php?callback=callback&mode=send_verification&email=2477872205@qq.com';
            script.onerror = function() {
                log('失败: 脚本加载错误');
            };
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
