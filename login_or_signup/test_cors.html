<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CORS测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #result { background: #f0f0f0; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>CORS 测试</h2>
    <button onclick="testPing()">测试 ping</button>
    <button onclick="testSendCode()">测试发送验证码</button>
    <div id="result"></div>
    
    <script>
        const API = 'https://song-shu.infinityfree.me/backend';
        
        function log(msg) {
            document.getElementById('result').textContent = msg;
        }
        
        async function testPing() {
            log('测试中...');
            try {
                const res = await fetch(API + '/auth.php?ping=1');
                const data = await res.json();
                log('成功: ' + JSON.stringify(data));
            } catch (e) {
                log('失败: ' + e.message);
            }
        }
        
        async function testSendCode() {
            log('测试中...');
            try {
                const res = await fetch(API + '/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: 'send_verification',
                        email: '2477872205@qq.com'
                    })
                });
                const data = await res.json();
                log('成功: ' + JSON.stringify(data));
            } catch (e) {
                log('失败: ' + e.message);
            }
        }
    </script>
</body>
</html>
